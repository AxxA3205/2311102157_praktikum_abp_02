<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gacha THR Ramadhan</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <style>
      .header-bg {
        background: linear-gradient(135deg, #0c4028 0%, #17663e 100%);
        position: relative;
        overflow: hidden;
      }

      .header-bg::after {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        top: -50%;
        left: -50%;
        opacity: 0.03;
        pointer-events: none;
        background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80"><g fill="%23ffffff" fill-opacity="1"><path fill-rule="evenodd" d="M11 0l6 6-6 6-6-6 6-6zM0 11l6 6-6 6-6-6 6-6zm22 0l6 6-6 6-6-6 6-6zM11 22l6 6-6 6-6-6 6-6zM44 0l6 6-6 6-6-6 6-6zM33 11l6 6-6 6-6-6 6-6zm22 0l6 6-6 6-6-6 6-6zM44 22l6 6-6 6-6-6 6-6zM77 0l6 6-6 6-6-6 6-6zM66 11l6 6-6 6-6-6 6-6zm22 0l6 6-6 6-6-6 6-6zM77 22l6 6-6 6-6-6 6-6zM11 44l6 6-6 6-6-6 6-6zM0 55l6 6-6 6-6-6 6-6zm22 0l6 6-6 6-6-6 6-6zM11 66l6 6-6 6-6-6 6-6zM44 44l6 6-6 6-6-6 6-6zM33 55l6 6-6 6-6-6 6-6zm22 0l6 6-6 6-6-6 6-6zM44 66l6 6-6 6-6-6 6-6zM77 44l6 6-6 6-6-6 6-6zM66 55l6 6-6 6-6-6 6-6zm22 0l6 6-6 6-6-6 6-6zM77 66l6 6-6 6-6-6 6-6z"/></g></svg>');
      }

      .gacha-item {
        cursor: pointer;
        transition: transform 0.2s ease;
      }
      .gacha-item:hover {
        transform: translateY(-5px);
      }
      .letter {
        transition:
          transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275),
          opacity 0.3s ease;
        opacity: 0;
        z-index: 1;
        width: 60%;
        height: 50px;
        bottom: 10px;
      }
      .opened .letter {
        transform: translate(-50%, -60px) !important;
        opacity: 1;
      }
      .envelope-icon {
        z-index: 2;
        color: #ffc107;
        filter: drop-shadow(0 0.25rem 0.25rem rgba(0, 0, 0, 0.1));
      }
      .opened {
        pointer-events: none;
        filter: grayscale(50%);
      }
    </style>
  </head>
  <body
    class="bg-white text-dark position-relative min-vh-100 overflow-x-hidden d-flex flex-column"
  >
    <div
      class="position-absolute w-100 h-100"
      style="z-index: 0; pointer-events: none; top: 0; left: 0"
    >
      <i
        class="bi bi-moon-stars-fill position-absolute text-success opacity-25 display-1"
        style="top: 35%; left: 5%"
      ></i>
      <i
        class="bi bi-star-fill position-absolute text-success opacity-25 display-4"
        style="top: 45%; right: 10%"
      ></i>
      <i
        class="bi bi-lantern position-absolute text-success opacity-25"
        style="bottom: 25%; left: 15%; font-size: 6rem"
      ></i>
      <i
        class="bi bi-star-fill position-absolute text-success opacity-25 display-6"
        style="bottom: 15%; right: 20%"
      ></i>
      <i
        class="bi bi-moon-fill position-absolute text-success opacity-25 display-3"
        style="top: 60%; left: 8%"
      ></i>
      <i
        class="bi bi-lantern position-absolute text-success opacity-25"
        style="top: 55%; right: 5%; font-size: 5rem"
      ></i>
    </div>

    <header
      class="header-bg text-white text-center position-relative z-1 shadow-sm"
    >
      <div class="container py-3">
        <h2 class="display-6 fw-bold text-warning mb-1">Gacha THR Ramadhan</h2>
        <p class="mb-3 text-white-50">
          Satu dari enam amplop ini berisi THR. Sisanya kosong.
        </p>
        <button
          class="btn btn-warning btn-sm fw-bold px-4 rounded-pill shadow-sm"
          onclick="resetGacha(this)"
        >
          <i class="bi bi-arrow-clockwise"></i> Acak Ulang Posisi
        </button>
      </div>
    </header>

    <main
      class="container my-auto position-relative z-1 flex-grow-1 d-flex flex-column justify-content-center py-4"
    >
      <div class="row justify-content-center g-3" id="gachaContainer"></div>
    </main>

    <footer
      class="text-center py-2 bg-dark text-white-50 mt-auto position-relative z-1"
    >
      <div class="container">
        <small class="fw-medium"
          >Mahija Danadyaksa Sadtomo - 2311102157 - S1IF-11-01</small
        >
      </div>
    </footer>

    <div class="modal fade" id="thrModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header" id="modalHeader">
            <h5 class="modal-title fw-bold" id="thrModalLabel">Hasil</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body text-center text-dark py-4">
            <h4 id="modalMessage" class="mb-3">Pesan</h4>
            <a
              href="https://youtu.be/xMHJGd3wwZk?si=cwLOrrv-9Vfw-2va"
              target="_blank"
              id="btnKlaim"
              class="btn btn-warning fw-bold d-none px-4 py-2 rounded-pill shadow-sm"
            >
              Ambil THR Anda <i class="bi bi-box-arrow-up-right ms-2"></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const modalElement = document.getElementById("thrModal");
      const thrModal = new bootstrap.Modal(modalElement);
      const gachaContainer = document.getElementById("gachaContainer");
      const totalAmplop = 6;

      let winningIndex = 0;

      function renderAmplop() {
        gachaContainer.innerHTML = "";
        winningIndex = Math.floor(Math.random() * totalAmplop) + 1;

        for (let i = 1; i <= totalAmplop; i++) {
          gachaContainer.innerHTML += `
            <div class="col-4 col-md-4 col-lg-2 text-center">
              <div class="gacha-item position-relative d-inline-block w-100" onclick="bukaAmplop(this, ${i})">
                <div class="letter bg-success bg-opacity-25 rounded shadow-sm position-absolute start-50 translate-middle-x d-flex align-items-center justify-content-center">
                  <i class="bi bi-cash-coin text-success fs-4"></i>
                </div>
                <i class="bi bi-envelope-fill envelope-icon position-relative d-block" style="font-size: 4.5rem;"></i>
                <span class="badge bg-light text-success border border-success mt-1 fs-6 rounded-pill shadow-sm">Amplop ${i}</span>
              </div>
            </div>
          `;
        }
      }

      function bukaAmplop(element, clickedIndex) {
        if (element.classList.contains("opened")) return;

        const icon = element.querySelector(".envelope-icon");
        icon.classList.replace("bi-envelope-fill", "bi-envelope-open-fill");
        element.classList.add("opened");

        setTimeout(() => {
          const modalHeader = document.getElementById("modalHeader");
          const modalMessage = document.getElementById("modalMessage");
          const btnKlaim = document.getElementById("btnKlaim");

          const isWin = clickedIndex === winningIndex;

          if (isWin) {
            modalHeader.className = "modal-header text-white bg-success";
            document.getElementById("thrModalLabel").innerText =
              "Alhamdulillah!";
            modalMessage.innerText = "selamat anda mendapatkan THR";
            btnKlaim.classList.remove("d-none");
          } else {
            modalHeader.className = "modal-header text-white bg-danger";
            document.getElementById("thrModalLabel").innerText = "Zonk!";
            modalMessage.innerText =
              "Maaf, amplop ini kosong. Silakan cari di amplop lain.";
            btnKlaim.classList.add("d-none");
          }

          thrModal.show();
        }, 600);
      }

      function resetGacha(btnElement) {
        if (btnElement) {
          const originalText = btnElement.innerHTML;

          btnElement.innerHTML =
            '<i class="bi bi-hourglass-split"></i> Mengacak...';
          btnElement.classList.add("disabled");

          gachaContainer.style.opacity = "0.1";
          gachaContainer.style.transition = "opacity 0.4s ease";

          setTimeout(() => {
            renderAmplop();

            btnElement.innerHTML = originalText;
            btnElement.classList.remove("disabled");
            gachaContainer.style.opacity = "1";
          }, 500);
        } else {
          renderAmplop();
        }
      }

      renderAmplop();
    </script>
  </body>
</html>
